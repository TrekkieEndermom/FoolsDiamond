name: Bug or Incompatibility
description: Report unexpected behavior or incompatibility with other plugins.
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: Server version and platform
      description: Run `/version` and paste the full output here.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Plugin config
      description: Share your current plugin configuration
      value: |
        ``` yaml
        Paste your config.yml here
        ```
  - type: textarea
    attributes:
      label: Describe the issue
      description: A clear and concise description of the issue you are experiencing with the plugin.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected the plugin to do.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Detailed instructions or a video to help reconstruct the issue.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Plugin list
      description: |
        All plugins running on your server. Run `/plugins` to get the list.
        If you are not using any other plugins, then put down \"none\" for this section.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context about the problem here that does not fit other sections.
    validations:
      required: false
